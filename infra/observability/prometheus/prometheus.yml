global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nritax-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - nritax-api-stable.nritax-production.svc.cluster.local:5000
          - nritax-api-canary.nritax-production.svc.cluster.local:5000
    bearer_token: ${METRICS_AUTH_TOKEN}

  - job_name: nritax-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - nritax-worker.nritax-production.svc.cluster.local:5000
          - nritax-worker-priority.nritax-production.svc.cluster.local:5000
          - nritax-worker-batch.nritax-production.svc.cluster.local:5000
          - nritax-worker-ai.nritax-production.svc.cluster.local:5000
          - nritax-gpu-worker.nritax-production.svc.cluster.local:5000
    bearer_token: ${METRICS_AUTH_TOKEN}

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector.nritax-observability.svc.cluster.local:8889
