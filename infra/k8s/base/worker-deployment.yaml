apiVersion: apps/v1
kind: Deployment
metadata:
  name: nritax-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nritax-worker
  template:
    metadata:
      labels:
        app: nritax-worker
        tier: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/nritaxai/worker:latest
          env:
            - name: NODE_ENV
              value: production
            - name: APP_RUNTIME
              value: k8s
            - name: BACKGROUND_JOBS_ENABLED
              value: "true"
            - name: PROMETHEUS_METRICS_ENABLED
              value: "true"
            - name: WORKER_CONCURRENCY
              value: "6"
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
