apiVersion: apps/v1
kind: Deployment
metadata:
  name: nritax-worker-batch
spec:
  replicas: 0
  selector:
    matchLabels:
      app: nritax-worker-batch
  template:
    metadata:
      labels:
        app: nritax-worker-batch
        tier: worker
        worker-group: batch
        workload: batch
    spec:
      terminationGracePeriodSeconds: 90
      containers:
        - name: worker
          image: ghcr.io/nritaxai/worker:latest
          env:
            - name: NODE_ENV
              value: production
            - name: APP_NAME
              value: nritax-worker-batch
            - name: APP_RUNTIME
              value: k8s
            - name: WORKER_GROUP
              value: batch
            - name: WORKER_QUEUES
              value: pdf-jobs,report-jobs
            - name: BACKGROUND_JOBS_ENABLED
              value: "true"
            - name: PDF_QUEUE_ENABLED
              value: "true"
            - name: REPORT_QUEUE_ENABLED
              value: "true"
            - name: PROMETHEUS_METRICS_ENABLED
              value: "true"
            - name: WORKER_CONCURRENCY__PDF_JOBS
              value: "2"
            - name: WORKER_CONCURRENCY__REPORT_JOBS
              value: "2"
            - name: WORKER_CONCURRENCY
              value: "2"
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /readyz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /livez
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 20"]
          resources:
            requests:
              cpu: 750m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
