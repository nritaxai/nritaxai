<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn Sign-In</title>
  </head>
  <body>
    <script>
      (function () {
        function getAllowedOrigins() {
          var origins = [
            "https://nritax.ai",
            "https://www.nritax.ai",
            "http://localhost:5173",
            window.location.origin
          ];

          try {
            if (document.referrer) {
              origins.unshift(new URL(document.referrer).origin);
            }
          } catch (error) {
            console.error("[linkedin-oauth-callback] unable to read referrer origin", error);
          }

          return Array.from(new Set(origins.filter(Boolean)));
        }

        var params = new URLSearchParams(window.location.search);
        var payload = {
          source: "nritax-linkedin-oauth",
          code: params.get("code"),
          state: params.get("state"),
          error: params.get("error_description") || params.get("error"),
        };

        if (window.opener && !window.opener.closed) {
          getAllowedOrigins().forEach(function (origin) {
            try {
              window.opener.postMessage(payload, origin);
            } catch (error) {
              console.error("[linkedin-oauth-callback] postMessage failed", { origin: origin, error: error });
            }
          });
        }

        window.close();
      })();
    </script>
  </body>
</html>
