name: Build And Publish Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag"
        required: true
      source_ref:
        description: "Git ref to build from"
        required: false
        default: "main"
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/build-images.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.REGISTRY }}/${{ secrets.IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile.worker
          push: true
          tags: ${{ secrets.REGISTRY }}/${{ secrets.WORKER_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}

      - name: Publish build summary
        run: |
          {
            echo "## Published Images"
            echo ""
            echo "- API: \`${{ secrets.REGISTRY }}/${{ secrets.IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}\`"
            echo "- Worker: \`${{ secrets.REGISTRY }}/${{ secrets.WORKER_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
