name: Build And Publish Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag"
        required: true
      source_ref:
        description: "Git ref to build from"
        required: false
        default: "main"
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/build-images.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ${{ secrets.REGISTRY }}
      IMAGE_REPOSITORY: ${{ secrets.IMAGE_REPOSITORY }}
      WORKER_IMAGE_REPOSITORY: ${{ secrets.WORKER_IMAGE_REPOSITORY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Resolve registry auth
        id: registry-auth
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$REGISTRY" ]; then
            echo "Missing required secret: REGISTRY" >&2
            exit 1
          fi

          if [ -z "$IMAGE_REPOSITORY" ] || [ -z "$WORKER_IMAGE_REPOSITORY" ]; then
            echo "Missing required image repository secret." >&2
            exit 1
          fi

          if [ -n "$REGISTRY_USERNAME" ] && [ -n "$REGISTRY_PASSWORD" ]; then
            echo "username=$REGISTRY_USERNAME" >> "$GITHUB_OUTPUT"
            echo "password=$REGISTRY_PASSWORD" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$REGISTRY" = "ghcr.io" ]; then
            echo "username=${GITHUB_ACTOR}" >> "$GITHUB_OUTPUT"
            echo "password=${GITHUB_TOKEN}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Missing REGISTRY_USERNAME/REGISTRY_PASSWORD secrets for registry: $REGISTRY" >&2
          exit 1

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ steps.registry-auth.outputs.username }}
          password: ${{ steps.registry-auth.outputs.password }}

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile.worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}

      - name: Publish build summary
        run: |
          {
            echo "## Published Images"
            echo ""
            echo "- API: \`${REGISTRY}/${IMAGE_REPOSITORY}:${{ steps.meta.outputs.image_tag }}\`"
            echo "- Worker: \`${REGISTRY}/${WORKER_IMAGE_REPOSITORY}:${{ steps.meta.outputs.image_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
