name: Deploy Production Canary

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote"
        required: true
      region:
        description: "Primary region"
        required: true
        default: "us-central1"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Install Argo Rollouts plugin
        run: |
          curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x ./kubectl-argo-rollouts-linux-amd64
          sudo mv ./kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts
      - name: Configure kubectl
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_PRODUCTION }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
      - name: Set API canary image
        run: kubectl argo rollouts set image rollout/nritax-api api=${{ secrets.REGISTRY }}/${{ secrets.IMAGE_REPOSITORY }}:${{ inputs.image_tag }} -n nritax-production
      - name: Pause for canary analysis
        run: kubectl argo rollouts get rollout nritax-api -n nritax-production --watch --timeout 300s
      - name: Promote rollout after SLO checks
        run: kubectl argo rollouts promote nritax-api -n nritax-production
      - name: Roll out worker image
        run: kubectl set image deployment/nritax-worker worker=${{ secrets.REGISTRY }}/${{ secrets.WORKER_IMAGE_REPOSITORY }}:${{ inputs.image_tag }} -n nritax-production
