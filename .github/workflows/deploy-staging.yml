name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: true
        default: "main"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: imranismail/setup-kustomize@v2
      - uses: azure/setup-kubectl@v4
      - name: Install Argo Rollouts plugin
        run: |
          curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x ./kubectl-argo-rollouts-linux-amd64
          sudo mv ./kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts
      - name: Render staging manifests
        run: kustomize build infra/k8s/overlays/staging > /tmp/staging.yaml
      - name: Configure kubectl
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_STAGING }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"
      - name: Apply staging manifests
        run: kubectl apply -f /tmp/staging.yaml
      - name: Smoke check rollout
        run: |
          kubectl rollout status deployment/nritax-worker -n nritax-staging --timeout=180s
          kubectl argo rollouts get rollout nritax-api -n nritax-staging --watch --timeout 180s
