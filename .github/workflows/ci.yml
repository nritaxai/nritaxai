name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm install --no-package-lock

      - name: Install client dependencies
        run: npm --prefix client install --no-package-lock

      - name: Install server dependencies
        run: npm --prefix server install --no-package-lock

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Server tests
        run: npm run test:server

      - name: Client build
        run: npm --prefix client run build

      - name: Build API image
        run: docker build -t nritax-server-ci -f server/Dockerfile server

      - name: Build worker image
        run: docker build -t nritax-worker-ci -f server/Dockerfile.worker server

  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"

      - uses: imranismail/setup-kustomize@v2.1.0

      - name: Validate deployment safety rules
        run: node scripts/validate-k8s-safety.mjs

      - name: Render staging manifests
        run: kustomize build infra/k8s/overlays/staging > /tmp/staging.yaml

      - name: Render production manifests
        run: kustomize build infra/k8s/overlays/production > /tmp/production.yaml

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4.6.2
        with:
          name: rendered-manifests
          path: |
            /tmp/staging.yaml
            /tmp/production.yaml
