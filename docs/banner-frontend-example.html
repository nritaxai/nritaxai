<div class="ticker-container">
  <div class="ticker-track" id="ticker">Loading updates...</div>
</div>

<style>
  .ticker-container {
    width: 100%;
    overflow: hidden;
    background: #0b1f3a;
    color: #ffffff;
    padding: 10px 0;
  }

  .ticker-track {
    display: inline-flex;
    gap: 48px;
    white-space: nowrap;
    min-width: max-content;
    animation: banner-scroll 28s linear infinite;
  }

  .ticker-track:hover {
    animation-play-state: paused;
  }

  .ticker-item {
    color: #ffffff;
    text-decoration: none;
  }

  .ticker-badge {
    display: inline-block;
    margin-right: 10px;
    border-radius: 999px;
    background: #f59e0b;
    color: #111827;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
  }

  @keyframes banner-scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
</style>

<script>
  async function loadBanner() {
    const ticker = document.getElementById("ticker");
    if (!ticker) return;

    try {
      const response = await fetch("https://nritax.ai/api/banner-updates");
      const data = await response.json();

      if (!Array.isArray(data) || !data.length) {
        ticker.textContent = "No updates available";
        return;
      }

      const items = data
        .filter((item) => item.active === true)
        .sort((a, b) => {
          const priorityDelta = Number(a.priority || 0) - Number(b.priority || 0);
          if (priorityDelta !== 0) return priorityDelta;
          return Date.parse(String(b.date || "")) - Date.parse(String(a.date || ""));
        });

      if (!items.length) {
        ticker.textContent = "No updates available";
        return;
      }

      const html = items
        .map((item) => `
          <a class="ticker-item" href="${item.url}">
            <span class="ticker-badge">${item.label || "UPDATE"}</span>
            ${item.date || ""} | ${item.country || ""} | ${item.title}
          </a>
        `)
        .join("");

      ticker.innerHTML = html + html;
    } catch (error) {
      console.error("Banner error:", error);
      ticker.textContent = "No updates available";
    }
  }

  loadBanner();
  setInterval(loadBanner, 300000);
</script>
